<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slate Network Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* slate-900 */
        }
    </style>
</head>
<body class="min-h-screen text-slate-100">
    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-10">
            <h1 class="text-4xl font-bold tracking-tight">Slate Network Pulse</h1>
            <p class="text-slate-300 mt-3">A compact single-page dark-mode visualization concept for Stellar network attributes.</p>
            <p class="text-slate-300 mt-1">Back to the <a href="../index.html" class="text-cyan-300 hover:text-cyan-200">gallery</a> · Built for <a href="https://pakana.net" target="_blank" rel="noreferrer" class="text-cyan-300 hover:text-cyan-200">Pakana.net</a></p>
        </header>

        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <article class="rounded-xl bg-slate-800/80 border border-slate-700 p-5">
                <h2 class="text-xs uppercase tracking-wider text-slate-400">Network</h2>
                <p class="text-2xl font-semibold mt-2">Stellar Mainnet</p>
            </article>
            <article class="rounded-xl bg-slate-800/80 border border-slate-700 p-5">
                <h2 class="text-xs uppercase tracking-wider text-slate-400">Theme</h2>
                <p class="text-2xl font-semibold mt-2">Slate Pulse</p>
            </article>
            <article class="rounded-xl bg-slate-800/80 border border-slate-700 p-5">
                <h2 class="text-xs uppercase tracking-wider text-slate-400">App Type</h2>
                <p class="text-2xl font-semibold mt-2">Single Page</p>
            </article>
        </section>
    </main>
</body>
</html>
